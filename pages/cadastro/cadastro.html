<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/cadastro/cadastro.css">
</head>

<body class="custom-body">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card p-4 shadow form-container">
            <h2 class="text-center mb-3">Cadastro</h2>
            <form id="cadastroForm">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Digite seu nome">
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-control" placeholder="Digite seu e-mail">
                </div>

                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="senha" class="form-control" placeholder="Digite sua senha">
                </div>

                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="tel" id="telefone" class="form-control" placeholder="(XX) XXXXX-XXXX">
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Gênero</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" value="Masculino">
                        <label class="form-check-label">Masculino</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" value="Feminino">
                        <label class="form-check-label">Feminino</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="genero" value="Outro">
                        <label class="form-check-label">Outro</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Data de nascimento</label>
                    <input type="date" id="dataNascimento" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Estado</label>
                    <select id="estado" class="form-select">
                        <option selected disabled>Selecione seu estado</option>
                        <option value="AC">Acre</option>
                        <option value="AL">Alagoas</option>
                        <option value="AP">Amapá</option>
                        <option value="AM">Amazonas</option>
                        <option value="BA">Bahia</option>
                        <option value="CE">Ceará</option>
                        <option value="DF">Distrito Federal</option>
                        <option value="ES">Espírito Santo</option>
                        <option value="GO">Goiás</option>
                        <option value="MA">Maranhão</option>
                        <option value="MT">Mato Grosso</option>
                        <option value="MS">Mato Grosso do Sul</option>
                        <option value="MG">Minas Gerais</option>
                        <option value="PA">Pará</option>
                        <option value="PB">Paraíba</option>
                        <option value="PR">Paraná</option>
                        <option value="PE">Pernambuco</option>
                        <option value="PI">Piauí</option>
                        <option value="RJ">Rio de Janeiro</option>
                        <option value="RN">Rio Grande do Norte</option>
                        <option value="RS">Rio Grande do Sul</option>
                        <option value="RO">Rondônia</option>
                        <option value="RR">Roraima</option>
                        <option value="SC">Santa Catarina</option>
                        <option value="SP">São Paulo</option>
                        <option value="SE">Sergipe</option>
                        <option value="TO">Tocantins</option>
                    </select>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" id="termos" class="form-check-input">
                    <label class="form-check-label">Aceito os termos e condições</label>
                </div>

                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
            </form>
        </div>
    </div>

    <script src="cadastro.js"></script>
</body>
